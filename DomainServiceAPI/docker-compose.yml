services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Внешний Redis-брокер котировок (заглушка — отдельный инстанс).
  broker-redis:
    image: redis:7-alpine
    ports:
      - "${BROKER_REDIS_HOST_PORT}:6379"


  # SMTP-заглушка с веб-интерфейсом — http://localhost:${MAILHOG_UI_PORT}
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAIL_HOST_PORT}:1025"
      - "${MAILHOG_UI_PORT}:8025"

  domain-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      broker-redis:
        condition: service_started
      mailhog:
        condition: service_started
    ports:
      - "${APP_HOST_PORT}:${PORT}"

  market-service:
    build:
      context: ../services/market-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8050"
      MARKET_TICK_INTERVAL: "${MARKET_TICK_INTERVAL:-10s}"
      MARKET_DRIVER_CONFIG: "${MARKET_DRIVER_CONFIG:-}"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      MARKET_CONSUMER_GROUP: "market-service"
      MARKET_CONSUMER_NAME: "market-service-1"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${MARKET_SERVICE_HOST_PORT:-8050}:8050"

volumes:
  pg_data:
