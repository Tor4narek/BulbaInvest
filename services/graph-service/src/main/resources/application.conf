server {
  port = 8083
  port = ${?SERVER_PORT}
}

redis {
  host = "localhost"
  host = ${?REDIS_HOST}
  port = 6379
  port = ${?REDIS_PORT}
  # Channel on which StocksMarketAPI publishes price ticks
  channel = "stock_prices"
  channel = ${?REDIS_CHANNEL}
}

clickhouse {
  url      = "jdbc:clickhouse://localhost:8123"
  url      = ${?CLICKHOUSE_URL}
  user     = "default"
  user     = ${?CLICKHOUSE_USER}
  password = ""
  password = ${?CLICKHOUSE_PASSWORD}
  database = "stocksim"
  database = ${?CLICKHOUSE_DATABASE}
}

batch {
  # Flush accumulated price ticks to ClickHouse every N seconds
  flushIntervalSeconds = 10
  flushIntervalSeconds = ${?BATCH_FLUSH_INTERVAL_SECONDS}

  # Also flush immediately when this many ticks are buffered
  maxSize = 1000
  maxSize = ${?BATCH_MAX_SIZE}
}
