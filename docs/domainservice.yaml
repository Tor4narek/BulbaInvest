openapi: 3.0.3
info:
  title: DomainService API
  version: 1.0.0

servers:
  - url: https://api.domain.local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }

    UserWallet:
      type: object
      properties:
        id: { type: string }
        currency: { type: string }
        amount: { type: number }
        reservedAmount: { type: number }
        availableAmount: { type: number }
        isDefault: { type: boolean }

    PortfolioPosition:
      type: object
      properties:
        ticker: { type: string }
        quantity: { type: number }
        reservedQuantity: { type: number }
        availableQuantity: { type: number }
        averageBuyPrice: { type: number }

    Trade:
      type: object
      properties:
        id: { type: string }
        buyerUserId: { type: string, nullable: true }
        sellerUserId: { type: string, nullable: true }
        counterpartyType:
          type: string
          enum: [COMPANY, USER]
        tradeType:
          type: string
          enum: [BUY_FROM_COMPANY, SELL_TO_COMPANY, USER_TO_USER]
        ticker: { type: string }
        quantity: { type: number }
        price: { type: number }
        totalAmount: { type: number }

security:
  - bearerAuth: []

paths:

  /api/auth/code/request:
    post:
      summary: Request auth code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Auth code successfully sent to email

  /api/auth/code/confirm:
    post:
      summary: Confirm auth code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: User successfully authenticated

  /api/users/me:
    get:
      summary: Get current user
      responses:
        '200':
          description: Current user data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    patch:
      summary: Update current user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: User successfully updated

  /api/wallets/me:
    get:
      summary: Get user wallets
      responses:
        '200':
          description: List of user wallets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserWallet'

  /api/wallets:
    post:
      summary: Create wallet
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                currency:
                  type: string
      responses:
        '200':
          description: Wallet successfully created

  /api/wallets/{walletId}/make-default:
    post:
      summary: Set wallet as default
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wallet set as default successfully

  /api/wallets/{walletId}:
    delete:
      summary: Delete wallet
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wallet successfully deleted

  /api/portfolio:
    get:
      summary: Get portfolio
      responses:
        '200':
          description: User portfolio
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortfolioPosition'

  /api/portfolio/{ticker}:
    get:
      summary: Get portfolio position
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Portfolio position by ticker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioPosition'

  /api/trades/company/buy:
    post:
      summary: Buy stocks from company
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ticker: { type: string }
                quantity: { type: number }
                walletId: { type: string }
      responses:
        '200':
          description: Stock purchase successful

  /api/trades/company/sell:
    post:
      summary: Sell stocks to company
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ticker: { type: string }
                quantity: { type: number }
                walletId: { type: string }
      responses:
        '200':
          description: Stock sale successful

  /api/order-book/{ticker}:
    get:
      summary: Get order book
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order book data returned

  /api/orders/sell:
    post:
      summary: Create sell order
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ticker: { type: string }
                quantity: { type: number }
                price: { type: number }
      responses:
        '200':
          description: Sell order created

  /api/orders/buy:
    post:
      summary: Buy from order book
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ticker: { type: string }
                quantity: { type: number }
                maxPrice: { type: number }
                walletId: { type: string }
      responses:
        '200':
          description: Order successfully executed

  /api/orders/sell/{orderId}/buy:
    post:
      summary: Buy specific order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Specific order successfully executed

  /api/orders/sell/{orderId}/cancel:
    post:
      summary: Cancel sell order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order successfully cancelled

  /api/orders/my:
    get:
      summary: Get my orders
      responses:
        '200':
          description: List of user orders

  /api/trades:
    get:
      summary: Get trades history
      responses:
        '200':
          description: List of trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trade'
